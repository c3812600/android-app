name: Build Mobile Artifacts

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: android-actions/setup-android@v3

    - name: Build APK
      shell: bash
      run: |
        set -e
        npx cap add android || true
        mkdir -p resources
        if [ ! -f resources/icon.png ] && [ ! -f resources/icon.svg ] && [ -f resources/ico.svg ]; then cp resources/ico.svg resources/icon.svg; fi
        npx capacitor-assets generate --android || true
        npx cap sync android
        APP_ID=$(node -p "require('./capacitor.config.json').appId")
        PACKAGE_DIR="android/app/src/main/java/$(echo "$APP_ID" | tr '.' '/')"
        mkdir -p "$PACKAGE_DIR"
        cat > "$PACKAGE_DIR/MainActivity.java" <<EOF
        package $APP_ID;

        import android.os.Bundle;
        import com.getcapacitor.BridgeActivity;
        import androidx.core.view.WindowCompat;
        import androidx.core.view.WindowInsetsCompat;
        import androidx.core.view.WindowInsetsControllerCompat;

        public class MainActivity extends BridgeActivity {
          @Override
          protected void onCreate(Bundle savedInstanceState) {
            super.onCreate(savedInstanceState);
            WindowCompat.setDecorFitsSystemWindows(getWindow(), false);
            WindowInsetsControllerCompat controller =
              new WindowInsetsControllerCompat(getWindow(), getWindow().getDecorView());
            controller.hide(WindowInsetsCompat.Type.statusBars() | WindowInsetsCompat.Type.navigationBars());
            controller.setSystemBarsBehavior(
              WindowInsetsControllerCompat.BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE
            );
          }
        }
        EOF
        cd android && ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: android/app/build/outputs/apk/debug/*.apk

  export_ios_project:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Export iOS project
      shell: bash
      run: |
        set -e
        npx cap add ios || true
        mkdir -p resources
        if [ ! -f resources/icon.png ] && [ ! -f resources/icon.svg ] && [ -f resources/ico.svg ]; then cp resources/ico.svg resources/icon.svg; fi
        npx capacitor-assets generate --ios || true
        npx cap sync ios
        INFO_PLIST="ios/App/App/Info.plist"
        /usr/libexec/PlistBuddy -c "Delete :NSAppTransportSecurity" "$INFO_PLIST" || true
        /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$INFO_PLIST"
        /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$INFO_PLIST"
        xcodebuild -workspace ios/App/App.xcworkspace -scheme App -configuration Debug -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build

    - name: Upload iOS project
      uses: actions/upload-artifact@v4
      with:
        name: ios-xcode-project
        path: ios
