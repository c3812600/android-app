name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        npm install
        npm install @capacitor/cli @capacitor/core @capacitor/android --save-dev
        npm install @capacitor/assets --save-dev
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - uses: android-actions/setup-android@v3
    
    - name: Build APK
      run: |
        npx cap add android || true
        mkdir -p resources
        if [ ! -f resources/icon.png ] && [ ! -f resources/icon.svg ] && [ -f resources/ico.svg ]; then cp resources/ico.svg resources/icon.svg; fi
        npx capacitor-assets generate --android || true
        npx cap sync android
        PACKAGE_DIR="android/app/src/main/java/com/example/myapp"
        mkdir -p "$PACKAGE_DIR"
        cat > "$PACKAGE_DIR/MainActivity.java" << 'EOF'
        package com.example.myapp;

        import android.os.Bundle;
        import com.getcapacitor.BridgeActivity;
        import androidx.core.view.WindowCompat;
        import androidx.core.view.WindowInsetsCompat;
        import androidx.core.view.WindowInsetsControllerCompat;

        public class MainActivity extends BridgeActivity {
          @Override
          protected void onCreate(Bundle savedInstanceState) {
            super.onCreate(savedInstanceState);
            WindowCompat.setDecorFitsSystemWindows(getWindow(), false);
            WindowInsetsControllerCompat controller =
              new WindowInsetsControllerCompat(getWindow(), getWindow().getDecorView());
            controller.hide(WindowInsetsCompat.Type.statusBars() | WindowInsetsCompat.Type.navigationBars());
            controller.setSystemBarsBehavior(
              WindowInsetsControllerCompat.BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE
            );
          }
        }
        EOF
        cd android && ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: android/app/build/outputs/apk/debug/*.apk
    
    - name: Send Email
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.qq.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "APK 构建完成"
        to: ${{ secrets.NOTIFY_EMAIL }}
        from: ${{ secrets.EMAIL_USERNAME }}
        attachments: android/app/build/outputs/apk/debug/app-debug.apk
