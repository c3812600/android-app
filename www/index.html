<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的应用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 400px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .btn {
            display: inline-block;
            background: #fff;
            color: #667eea;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            margin: 10px;
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .info {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.8;
        }
        
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚀</div>
        <h1>Hello World</h1>
        
        <div class="card">
            <h2>GitHub Actions 构建测试</h2>
            <p>这是一个用于测试自动构建的示例应用</p>
        </div>
        
        <button class="btn" onclick="showAlert()">点击测试</button>
        <a href="https://github.com/c3812600/android-app" class="btn">查看源码</a>
        
        <div class="info">
            <p>构建时间: <span id="buildTime"></span></p>
            <p>版本: 1.0.0</p>
        </div>
    </div>
    
    <script>
        function showAlert() {
            alert('✅ 应用运行正常！\n\n这是从 GitHub Actions 自动构建的 APK');
        }
        
        // 显示当前时间
        document.getElementById('buildTime').textContent = new Date().toLocaleString('zh-CN');
        
        console.log('应用已加载');
    </script>
</body>
</html>
