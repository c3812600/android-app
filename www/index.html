<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumena Smart Control</title>
  <script src="assets/vendor/tailwindcss.js"></script>
  <script src="assets/vendor/lucide.js"></script>
  <script src="assets/js/button-hex.js"></script>
  <script src="assets/js/websocket.js"></script>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body class="min-h-screen w-full bg-black bg-cover bg-center bg-no-repeat flex items-center justify-center p-8 font-sans">
  
  <!-- Overlay to ensure readability -->
  <div class="absolute inset-0 bg-black/10 pointer-events-none"></div>

  <div class="relative w-full max-w-7xl z-10 flex flex-col gap-8">
    
    <!-- Header Section -->
    <div class="w-full flex justify-center fade-in" style="animation: fadeInDown 0.5s ease-out forwards;">
      <div class="glass-card px-16 py-8">
        <div class="flex items-center justify-center gap-3">
          <h1 class="text-4xl font-bold text-gray-900 tracking-tighter text-center">
            Lumena By Omniyat
          </h1>
          <span id="headerConnectionStatus" class="inline-flex h-3 w-3 rounded-full bg-amber-500" aria-label="连接中"></span>
        </div>
      </div>
    </div>

    <!-- Main Control Panel -->
    <div class="w-full fade-in" style="animation: zoomIn 0.5s ease-out 0.1s forwards; opacity: 0;">
      <div class="glass-card p-10">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="control-grid">
          
          <!-- Master Power Switch -->
          <div class="lg:col-span-3 mb-4">
            <div class="flex items-center justify-between bg-white/20 p-6 rounded-3xl border border-white/30">
              <div class="flex items-center gap-4">
                <div id="master-icon" class="icon-wrapper p-4 rounded-2xl bg-white/40 text-gray-600">
                  <i data-lucide="power" class="w-8 h-8"></i>
                </div>
                <div>
                  <h2 class="text-2xl font-bold text-gray-900">总控 (Master)</h2>
                  <p class="text-sm text-gray-600">控制所有照明系统</p>
                </div>
              </div>
              
              <!-- Master Buttons -->
              <div class="flex items-center gap-3">
                <button onclick="turnAllOn()" class="px-6 py-2.5 bg-[#2096f3] hover:bg-blue-600 text-white rounded-xl font-bold shadow-md transition-all active:scale-95 flex items-center gap-2 border border-blue-400">
                  <i data-lucide="sun" class="w-5 h-5"></i> 全亮
                </button>
                <button onclick="turnAllOff()" class="px-6 py-2.5 bg-gray-500 hover:bg-gray-600 text-white rounded-xl font-bold shadow-md transition-all active:scale-95 flex items-center gap-2 border border-gray-400">
                  <i data-lucide="moon" class="w-5 h-5"></i> 全暗
                </button>
              </div>
            </div>
          </div>

          <!-- The rest of the cards will be injected dynamically by JavaScript -->

        </div>
      </div>
    </div>

    <!-- Footer Info -->
    <div class="flex justify-between items-center px-4 text-white/80 text-sm font-medium">
      <span id="current-date"></span>
      <span id="connectionStatus" class="connecting">系统状态: 连接中...</span>
    </div>

  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
