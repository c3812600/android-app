<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchModeler Villa Control</title>
    <style>
        :root {
            --panel-bg: rgba(245, 245, 245, 0.85);
            --item-bg: #ffffff;
            --text-color: #333;
            --header-bg: #000;
            --header-h: 10vh;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :focus,
        :focus-visible {
            outline: none;
        }

        body {
            background-color: #333;
            height: 100vh;
            overflow: hidden;
        }

        .tablet-container {
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* 顶部状态栏 */
        .header {
            width: 100%;
            height: var(--header-h);
            background-color: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 30px;
            color: white;
            z-index: 10;
            position: relative;
        }

        .menu-toggle {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
        }

        .menu-toggle:active {
            background-color: rgba(255, 255, 255, 0.12);
        }

        .menu-icon {
            width: 18px;
            height: 12px;
            position: relative;
        }

        .menu-icon span {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 2px;
            transition: transform 220ms ease, top 220ms ease, opacity 220ms ease;
            transform-origin: center;
        }

        .menu-icon span:nth-child(1) { top: 0; }
        .menu-icon span:nth-child(2) { top: 5px; }
        .menu-icon span:nth-child(3) { top: 10px; }

        .tablet-container:not(.panel-collapsed) .menu-icon span:nth-child(1) {
            top: 5px;
            transform: rotate(45deg);
        }

        .tablet-container:not(.panel-collapsed) .menu-icon span:nth-child(2) {
            opacity: 0;
        }

        .tablet-container:not(.panel-collapsed) .menu-icon span:nth-child(3) {
            top: 5px;
            transform: rotate(-45deg);
        }

        .header-title {
            font-size: clamp(22px, calc(var(--header-h) * 0.38), 40px);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .status-light {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .status-light.disconnected {
            background-color: #ff4d4d;
            box-shadow: 0 0 10px #ff4d4d;
        }

        .status-light.connecting {
            background-color: #ffcc00;
            box-shadow: 0 0 10px #ffcc00;
        }

        .status-light.connected {
            background-color: #4cd964;
            box-shadow: 0 0 10px #4cd964;
        }

        /* 控制面板布局 */
        .content-area {
            display: flex;
            height: calc(100% - var(--header-h));
            position: relative;
        }

        .control-panel {
            width: 380px;
            background-color: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 2;
            transition: transform 220ms ease;
            will-change: transform;
            overflow-y: auto;
        }

        .villa-view {
            flex: 1;
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            background-image: url('assets/images/bg0.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
        }

        .tablet-container.panel-collapsed .control-panel {
            transform: translateX(-100%);
        }

        .panel-title {
            font-size: 18px;
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* 控制条目样式 */
        .control-item {
            background-color: var(--item-bg);
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .control-item:active {
            transform: scale(0.98);
        }

        .label {
            font-size: 18px;
            color: var(--text-color);
            font-weight: 500;
        }

        /* 开关样式 */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #4cd964;
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }
    </style>
</head>
<body>

    <div class="tablet-container">
        <!-- 顶部标题栏 -->
        <div class="header">
            <div class="menu-toggle" id="menuToggle" title="菜单">
                <div class="menu-icon" aria-hidden="true">
                    <span></span><span></span><span></span>
                </div>
            </div>
            <div class="header-title">ArchModeler Villa Sample</div>
            <div class="status-light connecting" id="connectionStatus" title="正在连接"></div>
        </div>

        <div class="content-area">
            <!-- 左侧控制面板 -->
            <div class="control-panel">
                <div class="panel-title">MODEL LIGHT CONTROL</div>

                <div class="control-item">
                    <span class="label">All Lights</span>
                    <label class="switch">
                        <input type="checkbox" data-button-id="allLights">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="control-item">
                    <span class="label">Bedroom Lights</span>
                    <label class="switch">
                        <input type="checkbox" data-button-id="bedroomLights">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="control-item">
                    <span class="label">Living Room Lights</span>
                    <label class="switch">
                        <input type="checkbox" data-button-id="livingRoomLights">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="control-item">
                    <span class="label">Bathroom & Restroom Lights</span>
                    <label class="switch">
                        <input type="checkbox" data-button-id="bathroomRestroomLights">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="control-item">
                    <span class="label">Swimming Pool Lights</span>
                    <label class="switch">
                        <input type="checkbox" data-button-id="swimmingPoolLights">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="control-item">
                    <span class="label">Garden Lights</span>
                    <label class="switch">
                        <input type="checkbox" data-button-id="gardenLights">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="villa-view" id="villaView"></div>
        </div>
    </div>

    <script src="assets/button_hex.js"></script>
    <script src="websocket.js"></script>
    <script>
        (function () {
            var view = document.getElementById('villaView');
            if (!view) return;
            var tablet = document.querySelector('.tablet-container');
            if (!tablet) return;
            var imgs = ['bg0.png', 'bg1.png', 'bg2.png', 'bg3.png', 'bg4.png', 'bg5.png'];
            var idx = 0;
            function setBg(i) {
                idx = ((i % imgs.length) + imgs.length) % imgs.length;
                view.style.backgroundImage = 'url(' + 'assets/images/' + imgs[idx] + ')';
            }
            for (var i = 0; i < imgs.length; i++) {
                var im = new Image();
                im.src = 'assets/images/' + imgs[i];
            }
            var startX = 0;
            var startY = 0;
            var tracking = false;
            var width = 0;
            var edgeGuard = 40;
            var swipeThreshold = 60;
            view.addEventListener('touchstart', function (e) {
                if (!e.touches || e.touches.length === 0) return;
                if (!tablet.classList.contains('panel-collapsed')) {
                    tracking = false;
                    return;
                }
                var rect = view.getBoundingClientRect();
                width = rect.width;
                var t = e.touches[0];
                startX = t.clientX - rect.left;
                startY = t.clientY - rect.top;
                if (startX < edgeGuard || startX > width - edgeGuard) {
                    tracking = false;
                    return;
                }
                tracking = true;
            }, { passive: true });
            view.addEventListener('touchend', function (e) {
                if (!tracking) return;
                var changed = e.changedTouches && e.changedTouches[0];
                if (!changed) {
                    tracking = false;
                    return;
                }
                var rect = view.getBoundingClientRect();
                var endX = changed.clientX - rect.left;
                var endY = changed.clientY - rect.top;
                var dx = endX - startX;
                var dy = endY - startY;
                if (Math.abs(dy) < 100) {
                    if (dx < -swipeThreshold) setBg(idx + 1);
                    else if (dx > swipeThreshold) setBg(idx - 1);
                }
                tracking = false;
            }, { passive: true });
            setBg(0);
        })();
    </script>

    <script>
        window.addEventListener('DOMContentLoaded', function () {
            var tablet = document.querySelector('.tablet-container');
            var menuToggle = document.getElementById('menuToggle');
            if (tablet) tablet.classList.add('panel-collapsed');
            if (tablet && menuToggle) {
                menuToggle.addEventListener('click', function () {
                    tablet.classList.toggle('panel-collapsed');
                });
            }
            if (window.VillaControl && typeof window.VillaControl.initWsControls === 'function') {
                var opts = {};
                if (window.VILLA_WS_URL) opts.wsUrl = window.VILLA_WS_URL;
                if (window.BUTTON_HEX) opts.config = window.BUTTON_HEX;
                window.VillaControl.initWsControls(opts);
            }
        });
    </script>
</body>
</html>
